<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morrow Weather</title><style>
:root{--c:#f3efe4;--n:#13263b;--o:#f26b4f}*{box-sizing:border-box}body{margin:0;background:var(--c);color:var(--n);font-family:Arial,sans-serif}.wrap{width:min(1140px,calc(100% - 32px));margin:auto}nav{height:80px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #13263b33}.brand{font-size:24px;font-weight:800}.brand i{color:var(--o)}nav small{font:12px monospace;text-transform:uppercase}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:70px;align-items:end;padding:65px 0 45px}.tag{color:var(--o);font:700 11px monospace;letter-spacing:.15em}h1{margin:12px 0 0;font-size:clamp(60px,8vw,108px);line-height:.83;letter-spacing:-.07em}h1 em{color:var(--o);font-family:Georgia;font-weight:400}.form label{display:block;font:700 11px monospace;letter-spacing:.1em;margin-bottom:12px}.row{display:flex;border-bottom:2px solid var(--n);padding-bottom:10px}input{flex:1;min-width:0;background:none;border:0;outline:0;font-size:20px;color:var(--n)}button{border:0;border-radius:99px;background:var(--o);color:white;padding:14px 20px;font-weight:700;cursor:pointer}.panel{display:grid;grid-template-columns:1.15fr 2fr;background:var(--n);color:white;border-radius:24px 24px 0 0;overflow:hidden;min-height:290px}.current{padding:32px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid #ffffff26}.place{font-size:25px;font-weight:700;margin:0}.cond{color:#afbdca;margin:5px 0}.now{display:flex;align-items:center;justify-content:space-between}.icon{font:65px Georgia;color:#ffd26f}.temp{font-size:80px;font-weight:800;letter-spacing:-.08em}.meta{display:flex;gap:25px;color:#aab9c7;font-size:13px}.days{display:grid;grid-template-columns:repeat(5,1fr)}article{padding:28px 16px;border-right:1px solid #ffffff20;display:flex;flex-direction:column;justify-content:space-between}.day{font:700 11px monospace;color:#aab9c7;text-transform:uppercase}.dicon{font:42px Georgia;color:#ffd26f;margin:30px 0}.rain{color:#8fa2b3;font-size:12px}.status{grid-column:1/-1;display:grid;place-items:center;min-height:290px}@media(max-width:760px){nav small{display:none}.hero{display:block;padding:45px 0 30px}h1{margin-bottom:35px}.panel{grid-template-columns:1fr}.current{min-height:280px}.days{overflow:auto;grid-template-columns:repeat(5,125px)}}
</style></head><body><div class="wrap"><nav><div class="brand">Morrow<i>°</i></div><small>Weather, made simple.</small></nav><section class="hero"><div><div class="tag">YOUR DAILY OUTLOOK</div><h1>Know what’s<br>coming <em>next.</em></h1></div><form class="form" id="form"><label for="city">SEARCH A CITY</label><div class="row"><input id="city" value="Istanbul"><button>See forecast →</button></div></form></section><section class="panel" id="panel"><div class="status">Reading the skies…</div></section></div><script>
const text={0:'Clear sky',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Storm & hail',99:'Storm & hail'};const icon=c=>c===0?'☀':c<=2?'◑':c<=48?'☁':c>=71&&c<=75?'❄':c>=95?'ϟ':'☂';
async function load(city){const p=document.querySelector('#panel');p.innerHTML='<div class="status">Reading the skies…</div>';try{const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=en&format=json').then(r=>r.json()),x=g.results?.[0];if(!x)throw Error('We couldn’t find that city.');const q=new URLSearchParams({latitude:x.latitude,longitude:x.longitude,timezone:'auto',current:'temperature_2m,apparent_temperature,weather_code,wind_speed_10m',daily:'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max',forecast_days:6}),w=await fetch('https://api.open-meteo.com/v1/forecast?'+q).then(r=>r.json()),c=w.current;p.innerHTML=`<div class="current"><div><p class="place">${x.name}, ${x.country_code}</p><p class="cond">${text[c.weather_code]||'Changing skies'}</p></div><div class="now"><span class="icon">${icon(c.weather_code)}</span><span class="temp">${Math.round(c.temperature_2m)}°</span></div><div class="meta"><span>Feels like <b>${Math.round(c.apparent_temperature)}°</b></span><span>Wind <b>${Math.round(c.wind_speed_10m)} km/h</b></span></div></div><div class="days">${w.daily.time.slice(1).map((d,i)=>`<article><div class="day">${new Date(d+'T12:00').toLocaleDateString('en',{weekday:'short'})}</div><div class="dicon">${icon(w.daily.weather_code[i+1])}</div><div><b>${Math.round(w.daily.temperature_2m_max[i+1])}°</b> <span style="color:#8193a4">${Math.round(w.daily.temperature_2m_min[i+1])}°</span><div class="rain">${w.daily.precipitation_probability_max[i+1]||0}% rain</div></div></article>`).join('')}</div>`}catch(e){p.innerHTML='<div class="status">'+e.message+'</div>'}}document.querySelector('#form').addEventListener('submit',e=>{e.preventDefault();load(document.querySelector('#city').value)});load('Istanbul');
</script></body></html>
