<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>İklimTR — Tarihsel Hava Verileri</title><style>
:root{--p:#f4f0e5;--i:#102b3f;--o:#ef6b45;--m:#74c5a2}*{box-sizing:border-box}body{margin:0;background:var(--p);color:var(--i);font-family:Arial,sans-serif}.wrap{width:min(1160px,calc(100% - 32px));margin:auto}nav{height:80px;border-bottom:1px solid #102b3f33;display:flex;align-items:center;justify-content:space-between}.brand{font-size:24px;font-weight:800}.brand b{color:var(--o)}nav small,.tag,label,th,footer{font:700 10px monospace;letter-spacing:.11em;text-transform:uppercase}header{padding:55px 0 38px}.tag{color:var(--o)}h1{font-size:clamp(54px,7vw,92px);line-height:.9;letter-spacing:-.06em;margin:16px 0 20px}h1 em{font-family:Georgia;color:var(--o);font-weight:400}.intro{font-size:18px;color:#596b77}.filters{display:grid;grid-template-columns:1.2fr 1fr 1fr auto;gap:12px;background:var(--i);padding:22px;border-radius:20px 20px 0 0}label{color:#a7b4bd}select,input{display:block;width:100%;margin-top:8px;border:0;border-radius:9px;padding:13px;background:white;color:var(--i);font-size:15px}button{align-self:end;border:0;border-radius:99px;background:var(--o);color:white;padding:14px 22px;font-weight:700}.summary{display:grid;grid-template-columns:1.4fr repeat(3,1fr);background:white;border:1px solid #102b3f1f}.card{padding:22px;border-right:1px solid #102b3f1f}.card small{font:700 10px monospace;color:#70818d}.card strong{display:block;font-size:29px;margin:6px 0}.card span{font-size:12px;color:#70818d}.table{overflow:auto;background:white}table{width:100%;min-width:760px;border-collapse:collapse}th,td{text-align:left;padding:17px 20px;border-bottom:1px solid #102b3f16}th{color:#70818d}td{font-size:14px}.bar{display:block;width:120px;height:8px;border-radius:8px;background:#e7ece9;overflow:hidden}.bar i{display:block;height:100%;background:var(--m)}.msg{background:white;padding:65px;text-align:center}footer{padding:20px 0 35px;color:#70818d}@media(max-width:760px){nav small{display:none}.filters{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.card strong{font-size:23px}}
</style></head><body><div class="wrap"><nav><div class="brand">İklim<b>TR</b></div><small>Tarihsel hava arşivi</small></nav><header><div class="tag">TÜRKİYE • GEÇMİŞ HAVA VERİLERİ</div><h1>Şehrin geçmişini<br><em>havadan oku.</em></h1><div class="intro">Türkiye’nin 81 ili için geçmiş sıcaklık ve nem değerlerini karşılaştırın.</div></header><form class="filters" id="f"><label>Şehir<select id="city"></select></label><label>Başlangıç<input id="start" type="date"></label><label>Bitiş<input id="end" type="date"></label><button>Verileri getir →</button></form><div id="out"><div class="msg">Veriler yükleniyor…</div></div><footer>Veri kaynağı: Open-Meteo Historical Weather API</footer></div><script>
const cities='Adana,Adıyaman,Afyonkarahisar,Ağrı,Aksaray,Amasya,Ankara,Antalya,Ardahan,Artvin,Aydın,Balıkesir,Bartın,Batman,Bayburt,Bilecik,Bingöl,Bitlis,Bolu,Burdur,Bursa,Çanakkale,Çankırı,Çorum,Denizli,Diyarbakır,Düzce,Edirne,Elazığ,Erzincan,Erzurum,Eskişehir,Gaziantep,Giresun,Gümüşhane,Hakkari,Hatay,Iğdır,Isparta,İstanbul,İzmir,Kahramanmaraş,Karabük,Karaman,Kars,Kastamonu,Kayseri,Kırıkkale,Kırklareli,Kırşehir,Kilis,Kocaeli,Konya,Kütahya,Malatya,Manisa,Mardin,Mersin,Muğla,Muş,Nevşehir,Niğde,Ordu,Osmaniye,Rize,Sakarya,Samsun,Siirt,Sinop,Sivas,Şanlıurfa,Şırnak,Tekirdağ,Tokat,Trabzon,Tunceli,Uşak,Van,Yalova,Yozgat,Zonguldak'.split(',');city.innerHTML=cities.map(x=>`<option ${x==='İzmir'?'selected':''}>${x}</option>`).join('');const iso=d=>d.toISOString().slice(0,10),e=new Date();e.setDate(e.getDate()-5);end.value=iso(e);const s=new Date(e);s.setDate(s.getDate()-6);start.value=iso(s);end.max=iso(e);
async function load(){out.innerHTML='<div class="msg">Veriler yükleniyor…</div>';try{const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city.value)}&count=1&language=tr&format=json&countryCode=TR`).then(r=>r.json()),p=g.results?.[0];if(!p)throw Error('Şehir bulunamadı.');const q=new URLSearchParams({latitude:p.latitude,longitude:p.longitude,start_date:start.value,end_date:end.value,timezone:'Europe/Istanbul',daily:'temperature_2m_max,temperature_2m_min,temperature_2m_mean',hourly:'relative_humidity_2m'}),w=await fetch('https://archive-api.open-meteo.com/v1/archive?'+q).then(r=>r.json());if(w.error)throw Error(w.reason);const rows=w.daily.time.map((d,i)=>{const h=w.hourly.relative_humidity_2m.slice(i*24,(i+1)*24).filter(x=>x!=null);return{d,min:Math.round(w.daily.temperature_2m_min[i]),mean:Math.round(w.daily.temperature_2m_mean[i]),max:Math.round(w.daily.temperature_2m_max[i]),hum:Math.round(h.reduce((a,b)=>a+b,0)/h.length)}}),avg=Math.round(rows.reduce((a,r)=>a+r.mean,0)/rows.length),hum=Math.round(rows.reduce((a,r)=>a+r.hum,0)/rows.length);out.innerHTML=`<section class="summary"><div class="card"><small>SEÇİLİ ŞEHİR</small><strong>${city.value}</strong><span>${start.value} — ${end.value}</span></div><div class="card"><small>ORT. SICAKLIK</small><strong>${avg}°C</strong><span>Günlük ortalama</span></div><div class="card"><small>ORT. NEM</small><strong>%${hum}</strong><span>24 saat ortalaması</span></div><div class="card"><small>KAYIT</small><strong>${rows.length}</strong><span>Günlük veri</span></div></section><div class="table"><table><thead><tr><th>Tarih</th><th>En düşük</th><th>Ortalama</th><th>En yüksek</th><th>Ort. nem</th><th>Nem göstergesi</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${new Date(r.d+'T12:00').toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}</td><td>${r.min}°C</td><td><b>${r.mean}°C</b></td><td>${r.max}°C</td><td><b>%${r.hum}</b></td><td><i class="bar"><i style="width:${r.hum}%"></i></i></td></tr>`).join('')}</tbody></table></div>`}catch(e){out.innerHTML='<div class="msg">'+e.message+'</div>'}}f.addEventListener('submit',e=>{e.preventDefault();load()});load();
</script></body></html>
